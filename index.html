<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>句集エディタ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@300;400;500&display=swap');

:root {
  --bg:       #f7f3ec;
  --paper:    #fdfaf4;
  --ink:      #1c160e;
  --ink2:     #4a3f2f;
  --ink3:     #8c7a63;
  --rule:     #d6cfc2;
  --gold:     #b8922a;
  --gold2:    #e8c96a;
  --red:      #9b2217;
  --chapter:  #2c4a3e;
  --shadow:   rgba(28,22,14,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  color: var(--ink);
}

/* ========== レイアウト ========== */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: 56px 1fr;
  min-height: 100vh;
}

/* ========== ヘッダー ========== */
.topbar {
  grid-column: 1 / -1;
  background: var(--ink);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  border-bottom: 2px solid var(--gold);
  position: sticky;
  top: 0;
  z-index: 200;
}

.logo {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.25em;
  flex-shrink: 0;
}

.logo span {
  font-size: 10px;
  color: var(--gold2);
  letter-spacing: 0.2em;
  display: block;
  font-weight: 400;
}

.search-wrap {
  flex: 1;
  max-width: 320px;
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  padding: 0 10px;
  gap: 6px;
}

.search-wrap input {
  background: none;
  border: none;
  outline: none;
  color: #fff;
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  width: 100%;
  padding: 7px 0;
}

.search-wrap input::placeholder { color: rgba(255,255,255,0.3); }
.search-icon { color: rgba(255,255,255,0.4); font-size: 13px; }

.search-clear-btn {
  background: none; border: none; color: rgba(255,255,255,0.4);
  cursor: pointer; font-size: 14px; padding: 0; display: none;
}
.search-clear-btn.show { display: block; }

.topbar-actions {
  display: flex;
  gap: 8px;
  margin-left: auto;
}

.tbtn {
  background: none;
  border: 1px solid rgba(184,146,42,0.5);
  color: var(--gold2);
  padding: 5px 12px;
  font-family: 'Noto Serif JP', serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.2s;
  white-space: nowrap;
}
.tbtn:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }
.tbtn.primary { background: var(--gold); color: var(--ink); border-color: var(--gold); font-weight: 600; }
.tbtn.primary:hover { background: var(--gold2); }

/* ========== サイドバー ========== */
.sidebar {
  background: var(--paper);
  border-right: 1px solid var(--rule);
  overflow-y: auto;
  padding: 16px 0 80px;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
}

.sidebar-section {
  padding: 0 14px;
  margin-bottom: 20px;
}

.sidebar-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--ink3);
  margin-bottom: 8px;
  padding: 0 2px;
  text-transform: uppercase;
}

.meta-field {
  margin-bottom: 8px;
}

.meta-field label {
  display: block;
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: 0.1em;
  margin-bottom: 3px;
}

.meta-field input {
  width: 100%;
  background: white;
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 6px 8px;
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.meta-field input:focus { border-color: var(--gold); }

.sidebar-divider {
  border: none;
  border-top: 1px solid var(--rule);
  margin: 14px 0;
}

/* 目次 */
.toc-title {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--ink3);
  padding: 0 14px;
  margin-bottom: 6px;
}

.toc-list {
  list-style: none;
  padding: 0 6px;
}

.toc-item {
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.15s;
  display: flex;
  align-items: baseline;
  gap: 6px;
  line-height: 1.5;
}
.toc-item:hover { background: rgba(184,146,42,0.08); }
.toc-item.chapter { color: var(--chapter); font-size: 12px; font-weight: 500; letter-spacing: 0.1em; }
.toc-item.haiku { color: var(--ink2); font-size: 11px; padding-left: 20px; }
.toc-num { font-size: 10px; color: var(--ink3); flex-shrink: 0; }

/* 追加ボタン群 */
.add-btns {
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.add-btn {
  background: none;
  border: 1px dashed var(--rule);
  color: var(--ink3);
  padding: 7px 10px;
  font-family: 'Noto Serif JP', serif;
  font-size: 12px;
  letter-spacing: 0.1em;
  cursor: pointer;
  border-radius: 4px;
  text-align: left;
  transition: all 0.2s;
}
.add-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(184,146,42,0.05); }
.add-btn.chapter-btn { color: var(--chapter); border-color: rgba(44,74,62,0.3); }
.add-btn.chapter-btn:hover { background: rgba(44,74,62,0.06); border-color: var(--chapter); }

/* ========== メインエリア ========== */
.main {
  padding: 32px 40px 120px;
  overflow-y: auto;
  height: calc(100vh - 56px);
}

/* 句集タイトルブロック */
.book-header {
  text-align: center;
  margin-bottom: 48px;
  padding-bottom: 32px;
  border-bottom: 2px solid var(--rule);
  position: relative;
}

.book-title-display {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--ink);
  margin-bottom: 10px;
  min-height: 50px;
}

.book-author-display {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 16px;
  letter-spacing: 0.4em;
  color: var(--ink2);
  min-height: 24px;
}

.book-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 2px;
  background: var(--gold);
}

/* エントリーリスト */
.entries {
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* 章ブロック */
.entry-chapter {
  position: relative;
  margin: 32px 0 20px;
  padding: 20px 24px;
  background: linear-gradient(135deg, rgba(44,74,62,0.06), rgba(44,74,62,0.02));
  border-left: 3px solid var(--chapter);
  border-radius: 0 4px 4px 0;
  cursor: default;
}

.chapter-name {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.3em;
  color: var(--chapter);
}

.chapter-num {
  font-size: 10px;
  color: rgba(44,74,62,0.6);
  letter-spacing: 0.15em;
  margin-bottom: 4px;
}

/* 句ブロック */
.entry-haiku {
  position: relative;
  padding: 20px 24px 20px;
  border-bottom: 1px solid var(--rule);
  cursor: default;
  transition: background 0.15s;
  display: flex;
  align-items: flex-start;
  gap: 24px;
}

.entry-haiku:hover { background: rgba(184,146,42,0.03); }

.haiku-num {
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: 0.1em;
  flex-shrink: 0;
  padding-top: 4px;
  min-width: 28px;
}

.haiku-text-vertical {
  writing-mode: vertical-rl;
  font-family: 'Shippori Mincho B1', serif;
  font-size: 22px;
  line-height: 2;
  letter-spacing: 0.2em;
  color: var(--ink);
  flex-shrink: 0;
  min-height: 60px;
}

.haiku-note {
  font-size: 12px;
  color: var(--ink3);
  line-height: 1.8;
  letter-spacing: 0.05em;
  align-self: center;
}

/* ハイライト */
mark { background: rgba(184,146,42,0.3); color: var(--ink); border-radius: 2px; }

/* エントリーのアクションボタン */
.entry-actions {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.15s;
}

.entry-chapter:hover .entry-actions,
.entry-haiku:hover .entry-actions { opacity: 1; }

.eact {
  background: white;
  border: 1px solid var(--rule);
  color: var(--ink3);
  width: 28px;
  height: 28px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  box-shadow: 0 1px 3px var(--shadow);
}
.eact:hover { border-color: var(--gold); color: var(--gold); }
.eact.danger:hover { border-color: var(--red); color: var(--red); }
.eact.move { cursor: grab; }

/* ドラッグ中 */
.dragging { opacity: 0.4; }
.drag-over-top::before {
  content: '';
  display: block;
  height: 3px;
  background: var(--gold);
  border-radius: 2px;
  margin-bottom: 2px;
}
.drag-over-bottom::after {
  content: '';
  display: block;
  height: 3px;
  background: var(--gold);
  border-radius: 2px;
  margin-top: 2px;
}

/* 検索ヒット件数 */
.search-result-bar {
  background: rgba(184,146,42,0.1);
  border: 1px solid rgba(184,146,42,0.3);
  border-radius: 4px;
  padding: 8px 16px;
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 20px;
  display: none;
}
.search-result-bar.show { display: block; }

/* 空状態 */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink3);
}
.empty-state .big { font-family: 'Shippori Mincho B1', serif; font-size: 48px; color: var(--rule); display: block; margin-bottom: 16px; letter-spacing: 0.3em; }
.empty-state p { font-size: 13px; line-height: 2.2; letter-spacing: 0.1em; }

/* ========== モーダル ========== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(28,22,14,0.65);
  z-index: 400;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--paper);
  border-radius: 8px;
  width: 90%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  transform: translateY(16px);
  transition: transform 0.25s;
}
.overlay.open .modal { transform: translateY(0); }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--rule);
}
.modal-title {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 16px;
  letter-spacing: 0.2em;
  color: var(--ink);
}
.modal-close {
  background: none; border: none; font-size: 20px;
  color: var(--ink3); cursor: pointer; line-height: 1;
}

.modal-body { padding: 20px 24px; }

.mfield { margin-bottom: 14px; }
.mfield label { display: block; font-size: 11px; color: var(--ink3); letter-spacing: 0.12em; margin-bottom: 5px; }

.mfield input, .mfield textarea {
  width: 100%;
  background: white;
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 9px 12px;
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.mfield input:focus, .mfield textarea:focus { border-color: var(--gold); }
.mfield textarea { resize: vertical; min-height: 60px; line-height: 1.8; }

/* 縦書き入力 */
.vertical-input-area {
  background: white;
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 16px;
  margin-bottom: 14px;
  min-height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.vertical-input-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(90deg, transparent, transparent calc(33.3% - 1px), rgba(214,207,194,0.4) calc(33.3% - 1px), rgba(214,207,194,0.4) 33.3%);
  pointer-events: none;
}
.vertical-input-area textarea {
  writing-mode: vertical-rl;
  font-family: 'Shippori Mincho B1', serif;
  font-size: 20px;
  line-height: 2;
  letter-spacing: 0.2em;
  border: none;
  outline: none;
  background: transparent;
  color: var(--ink);
  resize: none;
  min-height: 110px;
  width: 100%;
}
.vertical-input-area textarea::placeholder { color: var(--rule); }

.modal-footer {
  padding: 14px 24px 20px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  border-top: 1px solid var(--rule);
}

.mbtn {
  background: none;
  border: 1px solid var(--rule);
  color: var(--ink2);
  padding: 8px 20px;
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  letter-spacing: 0.1em;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
}
.mbtn:hover { border-color: var(--ink2); }
.mbtn.primary { background: var(--ink); color: var(--gold); border-color: var(--ink); }
.mbtn.primary:hover { background: var(--ink2); }
.mbtn.danger { color: var(--red); border-color: rgba(155,34,23,0.4); }
.mbtn.danger:hover { background: var(--red); color: white; border-color: var(--red); }

/* 目次モーダル */
.toc-modal-list { list-style: none; }
.toc-modal-item {
  padding: 8px 0;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: baseline;
  gap: 12px;
  font-family: 'Noto Serif JP', serif;
}
.toc-modal-item.ch {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 15px;
  color: var(--chapter);
  letter-spacing: 0.15em;
  padding-top: 16px;
}
.toc-modal-item.hk { font-size: 13px; color: var(--ink2); padding-left: 16px; }
.toc-modal-num { font-size: 11px; color: var(--ink3); flex-shrink: 0; min-width: 30px; }

/* レスポンシブ */
@media (max-width: 640px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { padding: 20px 16px 80px; }
  .topbar { gap: 8px; }
  .search-wrap { max-width: 160px; }
}
</style>
</head>
<body>

<div class="layout">

  <!-- ヘッダー -->
  <header class="topbar">
    <div class="logo">句集<span>KUUSHU EDITOR</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="句・備考を検索...">
      <button class="search-clear-btn" id="searchClearBtn">✕</button>
    </div>
    <div class="topbar-actions">
      <button class="tbtn" id="btnToc">目次</button>
      <button class="tbtn" id="btnExport">📤 保存</button>
      <button class="tbtn" id="btnImport">📥 読込</button>
    </div>
  </header>

  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">句集の情報</div>
      <div class="meta-field">
        <label>タイトル</label>
        <input type="text" id="sideTitle" placeholder="句集のタイトル">
      </div>
      <div class="meta-field">
        <label>作者名</label>
        <input type="text" id="sideAuthor" placeholder="作者名">
      </div>
    </div>

    <hr class="sidebar-divider">

    <div class="add-btns">
      <div class="sidebar-label">追加</div>
      <button class="add-btn" id="btnAddHaiku">＋ 句を追加</button>
      <button class="add-btn chapter-btn" id="btnAddChapter">＋ 章を追加</button>
    </div>

    <hr class="sidebar-divider">

    <div class="toc-title">目次</div>
    <ul class="toc-list" id="tocList"></ul>
  </aside>

  <!-- メイン -->
  <main class="main">
    <div class="book-header">
      <div class="book-title-display" id="displayTitle">（タイトル未設定）</div>
      <div class="book-author-display" id="displayAuthor"></div>
    </div>

    <div class="search-result-bar" id="searchResultBar"></div>
    <div class="entries" id="entries"></div>
  </main>

</div>

<!-- 句編集モーダル -->
<div class="overlay" id="haikuModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="haikuModalTitle">句を追加</span>
      <button class="modal-close" id="haikuModalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="vertical-input-area">
        <textarea id="haikuTextInput" placeholder="古池や　蛙飛び込む　水の音" rows="3"></textarea>
      </div>
      <div class="mfield">
        <label>備考・鑑賞（任意）</label>
        <textarea id="haikuNoteInput" placeholder="季語・背景など" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="mbtn danger" id="haikuDeleteBtn" style="margin-right:auto;display:none">削除</button>
      <button class="mbtn" id="haikuCancelBtn">キャンセル</button>
      <button class="mbtn primary" id="haikuSaveBtn">保　存</button>
    </div>
  </div>
</div>

<!-- 章編集モーダル -->
<div class="overlay" id="chapterModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="chapterModalTitle">章を追加</span>
      <button class="modal-close" id="chapterModalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="mfield">
        <label>章の名前</label>
        <input type="text" id="chapterNameInput" placeholder="第一章　春の章">
      </div>
    </div>
    <div class="modal-footer">
      <button class="mbtn danger" id="chapterDeleteBtn" style="margin-right:auto;display:none">削除</button>
      <button class="mbtn" id="chapterCancelBtn">キャンセル</button>
      <button class="mbtn primary" id="chapterSaveBtn">保　存</button>
    </div>
  </div>
</div>

<!-- 目次モーダル -->
<div class="overlay" id="tocModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <span class="modal-title">目　次</span>
      <button class="modal-close" id="tocModalClose">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-family:'Shippori Mincho B1',serif;font-size:13px;text-align:center;color:var(--ink3);letter-spacing:0.2em;margin-bottom:16px" id="tocBookMeta"></div>
      <ul class="toc-modal-list" id="tocModalList"></ul>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
// ========== データ ==========
const SK = 'kuushu_editor_v1';
let book = { title: '', author: '', entries: [] };
// entry: { id, type:'haiku'|'chapter', text?, note?, name? }
let editingId = null;
let searchQuery = '';
let dragSrcId = null;

function genId() {
  return 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
}

// ========== 保存・読込 ==========
function saveData() {
  try { localStorage.setItem(SK, JSON.stringify(book)); } catch(e) {}
}

function loadData() {
  try {
    const d = localStorage.getItem(SK);
    if (d) {
      const parsed = JSON.parse(d);
      if (parsed && Array.isArray(parsed.entries)) {
        book = parsed;
      }
    }
  } catch(e) { console.error('load error', e); }
  applyMeta();
  render();
}

// ========== メタ情報 ==========
function applyMeta() {
  document.getElementById('sideTitle').value = book.title || '';
  document.getElementById('sideAuthor').value = book.author || '';
  updateDisplay();
}

function updateDisplay() {
  document.getElementById('displayTitle').textContent = book.title || '（タイトル未設定）';
  document.getElementById('displayAuthor').textContent = book.author || '';
}

document.getElementById('sideTitle').addEventListener('input', e => {
  book.title = e.target.value.trim();
  updateDisplay();
  saveData();
});
document.getElementById('sideAuthor').addEventListener('input', e => {
  book.author = e.target.value.trim();
  updateDisplay();
  saveData();
});

// ========== ユーティリティ ==========
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, q) {
  if (!q) return escHtml(text);
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(esc, 'gi'), m => `<mark>${m}</mark>`);
}

// ========== 描画 ==========
function render() {
  renderEntries();
  renderToc();
}

function renderEntries() {
  const container = document.getElementById('entries');
  const resultBar = document.getElementById('searchResultBar');
  const q = searchQuery.toLowerCase();

  let entries = book.entries;
  let haikuCount = 0;
  let chapterCount = 0;

  // 検索フィルター
  let filtered = entries;
  if (q) {
    filtered = entries.filter(e => {
      if (e.type === 'chapter') return e.name && e.name.toLowerCase().includes(q);
      return (e.text && e.text.toLowerCase().includes(q)) ||
             (e.note && e.note.toLowerCase().includes(q));
    });
    const hits = filtered.filter(e => e.type === 'haiku').length;
    resultBar.textContent = `「${searchQuery}」の検索結果：${hits}句`;
    resultBar.classList.add('show');
  } else {
    resultBar.classList.remove('show');
  }

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <span class="big">句</span>
        <p>${q ? '該当する句がありません' : 'まだ句がありません\nサイドバーの「句を追加」から始めてください'}</p>
      </div>`;
    return;
  }

  // 句番号・章番号を付与
  let hNum = 0;
  let cNum = 0;

  container.innerHTML = filtered.map(e => {
    if (e.type === 'chapter') {
      cNum++;
      return `
        <div class="entry-chapter" data-id="${e.id}" draggable="true">
          <div class="chapter-num">第${cNum}章</div>
          <div class="chapter-name">${highlight(e.name || '無題の章', q)}</div>
          <div class="entry-actions">
            <button class="eact move" data-drag="${e.id}" title="移動">⠿</button>
            <button class="eact" data-edit="${e.id}" title="編集">✎</button>
            <button class="eact danger" data-del="${e.id}" title="削除">✕</button>
          </div>
        </div>`;
    } else {
      hNum++;
      return `
        <div class="entry-haiku" data-id="${e.id}" draggable="true">
          <div class="haiku-num">${hNum}</div>
          <div class="haiku-text-vertical">${highlight(e.text || '', q)}</div>
          ${e.note ? `<div class="haiku-note">${highlight(e.note, q)}</div>` : ''}
          <div class="entry-actions">
            <button class="eact move" data-drag="${e.id}" title="移動">⠿</button>
            <button class="eact" data-edit="${e.id}" title="編集">✎</button>
            <button class="eact danger" data-del="${e.id}" title="削除">✕</button>
          </div>
        </div>`;
    }
  }).join('');

  // イベント
  container.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); openEdit(el.dataset.edit); });
  });
  container.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); deleteEntry(el.dataset.del); });
  });

  // ドラッグ&ドロップ
  container.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragover', onDragOver);
    el.addEventListener('dragleave', onDragLeave);
    el.addEventListener('drop', onDrop);
    el.addEventListener('dragend', onDragEnd);
  });
}

function renderToc() {
  const list = document.getElementById('tocList');
  let hNum = 0; let cNum = 0;
  list.innerHTML = book.entries.map(e => {
    if (e.type === 'chapter') {
      cNum++;
      return `<li class="toc-item chapter" data-scroll="${e.id}">
        <span class="toc-num">第${cNum}章</span>${escHtml(e.name || '無題の章')}
      </li>`;
    } else {
      hNum++;
      const short = (e.text || '').slice(0, 10);
      return `<li class="toc-item haiku" data-scroll="${e.id}">
        <span class="toc-num">${hNum}</span>${escHtml(short)}
      </li>`;
    }
  }).join('');

  list.querySelectorAll('[data-scroll]').forEach(el => {
    el.addEventListener('click', () => {
      const target = document.querySelector(`[data-id="${el.dataset.scroll}"]`);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  });
}

// ========== ドラッグ&ドロップ ==========
function onDragStart(e) {
  dragSrcId = this.dataset.id;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const rect = this.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  this.classList.remove('drag-over-top', 'drag-over-bottom');
  if (e.clientY < mid) this.classList.add('drag-over-top');
  else this.classList.add('drag-over-bottom');
}

function onDragLeave() {
  this.classList.remove('drag-over-top', 'drag-over-bottom');
}

function onDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over-top', 'drag-over-bottom');
  const targetId = this.dataset.id;
  if (!dragSrcId || dragSrcId === targetId) return;

  const rect = this.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  const insertAfter = e.clientY >= mid;

  const srcIdx = book.entries.findIndex(e => e.id === dragSrcId);
  const tgtIdx = book.entries.findIndex(e => e.id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;

  const [item] = book.entries.splice(srcIdx, 1);
  const newTgt = book.entries.findIndex(e => e.id === targetId);
  book.entries.splice(insertAfter ? newTgt + 1 : newTgt, 0, item);

  saveData();
  render();
}

function onDragEnd() {
  document.querySelectorAll('.dragging, .drag-over-top, .drag-over-bottom').forEach(el => {
    el.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
  });
  dragSrcId = null;
}

// ========== 句モーダル ==========
function openAddHaiku() {
  editingId = null;
  document.getElementById('haikuModalTitle').textContent = '句を追加';
  document.getElementById('haikuTextInput').value = '';
  document.getElementById('haikuNoteInput').value = '';
  document.getElementById('haikuDeleteBtn').style.display = 'none';
  openOverlay('haikuModal');
  setTimeout(() => document.getElementById('haikuTextInput').focus(), 300);
}

function openEdit(id) {
  const entry = book.entries.find(e => e.id === id);
  if (!entry) return;
  editingId = id;

  if (entry.type === 'haiku') {
    document.getElementById('haikuModalTitle').textContent = '句を編集';
    document.getElementById('haikuTextInput').value = entry.text || '';
    document.getElementById('haikuNoteInput').value = entry.note || '';
    document.getElementById('haikuDeleteBtn').style.display = 'inline-block';
    openOverlay('haikuModal');
    setTimeout(() => document.getElementById('haikuTextInput').focus(), 300);
  } else {
    document.getElementById('chapterModalTitle').textContent = '章を編集';
    document.getElementById('chapterNameInput').value = entry.name || '';
    document.getElementById('chapterDeleteBtn').style.display = 'inline-block';
    openOverlay('chapterModal');
    setTimeout(() => document.getElementById('chapterNameInput').focus(), 300);
  }
}

function saveHaiku() {
  const text = document.getElementById('haikuTextInput').value.trim();
  if (!text) { alert('句を入力してください'); return; }
  const note = document.getElementById('haikuNoteInput').value.trim();

  if (editingId) {
    const e = book.entries.find(e => e.id === editingId);
    if (e) { e.text = text; e.note = note; }
  } else {
    book.entries.push({ id: genId(), type: 'haiku', text, note });
  }
  saveData();
  render();
  closeOverlay('haikuModal');
}

// ========== 章モーダル ==========
function openAddChapter() {
  editingId = null;
  document.getElementById('chapterModalTitle').textContent = '章を追加';
  document.getElementById('chapterNameInput').value = '';
  document.getElementById('chapterDeleteBtn').style.display = 'none';
  openOverlay('chapterModal');
  setTimeout(() => document.getElementById('chapterNameInput').focus(), 300);
}

function saveChapter() {
  const name = document.getElementById('chapterNameInput').value.trim();
  if (!name) { alert('章の名前を入力してください'); return; }

  if (editingId) {
    const e = book.entries.find(e => e.id === editingId);
    if (e) e.name = name;
  } else {
    book.entries.push({ id: genId(), type: 'chapter', name });
  }
  saveData();
  render();
  closeOverlay('chapterModal');
}

// ========== 削除 ==========
function deleteEntry(id) {
  const e = book.entries.find(e => e.id === id);
  if (!e) return;
  const label = e.type === 'chapter' ? `章「${e.name}」` : `句「${e.text}」`;
  if (!confirm(`${label}を削除しますか？`)) return;
  book.entries = book.entries.filter(e => e.id !== id);
  saveData();
  render();
  closeOverlay('haikuModal');
  closeOverlay('chapterModal');
}

// ========== 目次モーダル ==========
function openToc() {
  const meta = document.getElementById('tocBookMeta');
  meta.textContent = [book.title, book.author].filter(Boolean).join('　　');

  const list = document.getElementById('tocModalList');
  let hNum = 0; let cNum = 0;
  list.innerHTML = book.entries.map(e => {
    if (e.type === 'chapter') {
      cNum++;
      return `<li class="toc-modal-item ch">
        <span class="toc-modal-num">第${cNum}章</span>${escHtml(e.name || '無題の章')}
      </li>`;
    } else {
      hNum++;
      return `<li class="toc-modal-item hk">
        <span class="toc-modal-num">${hNum}</span>${escHtml(e.text || '')}
      </li>`;
    }
  }).join('');

  openOverlay('tocModal');
}

// ========== エクスポート / インポート ==========
function exportData() {
  const blob = new Blob([JSON.stringify(book, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const fname = (book.title || '句集') + '_' + new Date().toISOString().slice(0,10) + '.json';
  a.download = fname;
  a.click();
}

function importData() { document.getElementById('fileInput').click(); }

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (parsed && Array.isArray(parsed.entries)) {
        if (confirm(`「${parsed.title || '無題'}」を読み込みます。現在のデータは上書きされます。よろしいですか？`)) {
          book = parsed;
          saveData();
          applyMeta();
          render();
        }
      } else { alert('句集のJSONファイルではありません'); }
    } catch(err) { alert('読み込みに失敗しました'); }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ========== 検索 ==========
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  document.getElementById('searchClearBtn').classList.toggle('show', searchQuery.length > 0);
  render();
});
document.getElementById('searchClearBtn').addEventListener('click', () => {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClearBtn').classList.remove('show');
  render();
});

// ========== オーバーレイ ==========
function openOverlay(id) { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.overlay.open').forEach(el => el.classList.remove('open'));
});

// ========== イベント登録 ==========
document.getElementById('btnAddHaiku').addEventListener('click', openAddHaiku);
document.getElementById('btnAddChapter').addEventListener('click', openAddChapter);
document.getElementById('btnToc').addEventListener('click', openToc);
document.getElementById('btnExport').addEventListener('click', exportData);
document.getElementById('btnImport').addEventListener('click', importData);

document.getElementById('haikuModalClose').addEventListener('click', () => closeOverlay('haikuModal'));
document.getElementById('haikuCancelBtn').addEventListener('click', () => closeOverlay('haikuModal'));
document.getElementById('haikuSaveBtn').addEventListener('click', saveHaiku);
document.getElementById('haikuDeleteBtn').addEventListener('click', () => deleteEntry(editingId));

document.getElementById('chapterModalClose').addEventListener('click', () => closeOverlay('chapterModal'));
document.getElementById('chapterCancelBtn').addEventListener('click', () => closeOverlay('chapterModal'));
document.getElementById('chapterSaveBtn').addEventListener('click', saveChapter);
document.getElementById('chapterDeleteBtn').addEventListener('click', () => deleteEntry(editingId));

document.getElementById('tocModalClose').addEventListener('click', () => closeOverlay('tocModal'));

// ========== 起動 ==========
loadData();
</script>
